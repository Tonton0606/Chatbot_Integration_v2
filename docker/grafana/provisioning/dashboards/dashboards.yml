# Tells Grafana where to find dashboard JSON files on disk.
# All .json files in /etc/grafana/provisioning/dashboards/ are auto-imported.
apiVersion: 1

providers:
  - name: Hermes
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
