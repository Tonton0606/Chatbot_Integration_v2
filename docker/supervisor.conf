; ─────────────────────────────────────────────────────────────────────────────
; Hermes Enterprise Portal — supervisord Configuration
; Manages sub-processes inside containers that run >1 process.
; Each process auto-restarts on crash (sub-second recovery).
; Separate log files per process, rotated automatically.
; ─────────────────────────────────────────────────────────────────────────────

[supervisord]
nodaemon=true
user=root
logfile=/var/log/hermes/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
loglevel=info
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/hermes/

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

; ── Server: Node.js supervised by PM2 (which itself is supervised) ──────────
; PM2 provides in-process crash recovery; supervisord is the outer cage.
[program:pm2]
command=pm2-runtime /app/pm2.config.js
process_name=pm2
numprocs=1
autostart=true
autorestart=true
startsecs=10
startretries=5
stopwaitsecs=15
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/hermes/pm2_stdout.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/hermes/pm2_stderr.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
environment=NODE_ENV="%(ENV_NODE_ENV)s",PORT="%(ENV_PORT)s"

; ── Google Maps Python Microservice (when bundled in server container) ──────
[program:gmaps]
command=python3 /app/services/googleMapsLeads/gmaps_http_server.py
process_name=gmaps
numprocs=1
autostart=true
autorestart=true
startsecs=5
startretries=5
stopwaitsecs=10
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/hermes/gmaps_stdout.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/hermes/gmaps_stderr.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
environment=PYTHONUNBUFFERED="1",FLASK_PORT="8000"

; ── Log rotation for all sub-processes ───────────────────────────────────────
[program:logrotate]
command=/usr/sbin/logrotate -f /etc/logrotate.d/hermes
process_name=logrotate
numprocs=1
autostart=false
autorestart=false
startsecs=0
startretries=0
stdout_logfile=/var/log/hermes/logrotate_stdout.log
stderr_logfile=/var/log/hermes/logrotate_stderr.log