# ═══════════════════════════════════════════════════════════════════════════════
# Promtail — Docker Log Scraper for Hermes (Dev Sidecar)
#
# TWO CLIENT MODES — controlled by env vars in docker-compose.override.yml:
#
#   Mode A (default): Local Loki sidecar
#     GRAFANA_LOKI_URL is not set → pushes to http://loki:3100
#
#   Mode B: Grafana Cloud
#     Set in docker-compose.override.yml environment:
#       GRAFANA_LOKI_URL=https://logs-prod-XXX.grafana.net
#       GRAFANA_LOKI_USER=<numeric user id>
#       GRAFANA_LOKI_API_KEY=<api key with Logs:Write scope>
#     Pushes to Grafana Cloud AND local Loki simultaneously.
#     Use this to validate cloud ingestion before deploying to Render.
#
# No changes to server/config/logger.js — Pino writes JSON to stdout,
# Docker captures it as json-file, Promtail reads it here.
# ═══════════════════════════════════════════════════════════════════════════════

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  # ── Always: local Loki sidecar ───────────────────────────────────────────────
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 2s
    batchsize: 512000

  # ── Optional: Grafana Cloud Loki ─────────────────────────────────────────────
  # Promtail only connects here when GRAFANA_LOKI_URL is set.
  # Leave the env vars unset in docker-compose.override.yml to disable.
  - url: ${GRAFANA_LOKI_URL:-http://loki:3100}/loki/api/v1/push
    basic_auth:
      username: ${GRAFANA_LOKI_USER:-}
      password: ${GRAFANA_LOKI_API_KEY:-}
    batchwait: 5s
    batchsize: 1048576
    # Tag so Grafana Cloud dashboards can filter dev traffic from prod
    external_labels:
      source: dev-local

scrape_configs:
  # ── Hermes containers — discovered via Docker socket ───────────────────────
  - job_name: hermes-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["hermes-"]

    relabel_configs:
      # Strip leading slash from Docker name (/hermes-server → hermes-server)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container

      # docker-compose service name (server, client, redis, gmaps)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service

      - action: labeldrop
        regex: __meta_docker_.*

    pipeline_stages:
      # ── Parse Pino's JSON log line ───────────────────────────────────────────
      - json:
          expressions:
            level: level
            msg: msg
            reqId: reqId
            workspaceId: workspaceId
            method: req.method
            url: req.url
            statusCode: res.statusCode
            responseTime: responseTime

      # ── level as Loki label (low cardinality — safe) ────────────────────────
      - labels:
          level:

      # ── reqId / workspaceId as structured metadata (Loki 3.x) ───────────────
      # High-cardinality values: queryable but don't inflate the label index.
      - structured_metadata:
          reqId:
          workspaceId:

      # ── Drop healthcheck poll noise ──────────────────────────────────────────
      - drop:
          expression: '.*(GET /health|GET /livez|healthcheck\.sh|redis-cli ping).*'
          drop_counter_reason: health_check_noise
