# ── Persistence ───────────────────────────────────────────────────────────────
# RDB snapshot: save if at least 1 key changed in the last 900s, 10 in 300s, 10000 in 60s
save 900 1
save 300 10
save 60 10000

# AOF for durability between RDB snapshots
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Memory management ─────────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Misc ──────────────────────────────────────────────────────────────────────
loglevel notice
databases 1
timeout 300
tcp-keepalive 60
