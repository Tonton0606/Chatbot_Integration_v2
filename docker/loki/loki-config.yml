# ═══════════════════════════════════════════════════════════════════════════════
# Loki 3.x — Log Aggregation Backend for Hermes
#
# Single-binary mode (no replication). Filesystem storage.
# Retention: 7 days (168h) — enough for incident investigation, low disk use.
# Auth disabled — Loki is on the isolated hermes-observability network only.
# ═══════════════════════════════════════════════════════════════════════════════

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # 7-day retention — compactor enforces this
  retention_period: 168h
  # Ingestion limits tuned for a single small SaaS
  ingestion_rate_mb: 4
  ingestion_burst_size_mb: 8
  max_query_length: 0h

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 10

analytics:
  reporting_enabled: false
