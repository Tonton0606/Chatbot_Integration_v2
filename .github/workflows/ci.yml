name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop, PRODUCTION-HERMESV2.2.2 ]
  pull_request:
    branches: [ main, master, PRODUCTION-HERMESV2.2.2 ]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-and-audit:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install server deps
        run: npm ci
        working-directory: ./server

      - name: Install client deps
        run: npm ci
        working-directory: ./client

      - name: Cross-tenant isolation tests — server
        run: npm test
        working-directory: ./server

      - name: npm audit — server (no HIGH/CRITICAL)
        run: npm audit --audit-level=high
        working-directory: ./server

      - name: npm audit — client (no HIGH/CRITICAL)
        run: npm audit --audit-level=high
        working-directory: ./client

      - name: ESLint — client (errors block; warnings are tracked debt)
        run: npx eslint src
        working-directory: ./client

  test-server:
    name: Server Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-audit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install server deps
        run: npm ci
        working-directory: ./server

      - name: Run Jest integration tests
        run: npm test
        working-directory: ./server
        env:
          NODE_ENV: test
          LOG_LEVEL: silent

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: lint-and-audit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install client deps
        run: npm ci
        working-directory: ./client

      - name: Vite production build
        run: npm run build
        working-directory: ./client
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_META_PIXEL_ID: ${{ secrets.VITE_META_PIXEL_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist-${{ github.sha }}
          path: client/dist
          retention-days: 7

  build-server-docker:
    name: Build Server Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-audit
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/PRODUCTION-HERMESV2.2.2'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.server
          push: false
          tags: hermesv2-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-client-docker:
    name: Build Client Docker Image
    runs-on: ubuntu-latest
    needs: build-client
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/PRODUCTION-HERMESV2.2.2'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the SAME image that compose/Render deploy (docker/Dockerfile.client
      # — full nginx.conf with the /api reverse proxy + VITE_* build args).
      # Requires the repo root as context because the Dockerfile COPYs docker/nginx.conf.
      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.client
          push: false
          tags: hermesv2-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
